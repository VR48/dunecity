# Dune2R Game Options
#
# Dune2R starts as a presentation mod, so these options intentionally mirror
# conservative classic play. Gameplay data falls back to vanilla unless this
# mod later adds explicit ObjectData.ini or QuantBot Config.ini overrides.
[Game Options]
Game Speed = 16
Concrete Required = true
Structures Degrade On Concrete = false
Fog of War = true
Start with Explored Map = false
Instant Build = false
Only One Palace = false
Rocket-Turrets Need Power = true
Sandworms Respawn = true
Killed Sandworms Drop Spice = true
Manual Carryall Drops = false
Maximum Number of Units Override = 0
Maximum Number of Harvesters Override = -1
Immortal Human Player = false
City Effects = false
